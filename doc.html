<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentos</title>
    <style>
            body {
            background-color: orangered;
            font-family: Arial, sans-serif;
            color: black;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 50px;
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        p {
            font-size: 1.2em;
        }

        a {
            display: block;
            margin: 15px 0;
            text-decoration: none;
            color: black;
            font-size: 1.5em;
            transition: transform 0.3s, color 0.3s;
        }

        a:hover {
            transform: scale(1.1);
            color: yellow;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

    </h1>

</html>
