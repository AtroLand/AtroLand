<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo!</title>
    <style>
        body {
            background-color: orangered;
            font-family: Arial, sans-serif;
            text-align: center;
            color: black;
            margin: 0;
            padding: 0;
        }

        h1 {
            animation: colorchange 1s infinite;
            margin-top: 50px;
        }

        @keyframes colorchange {
            0% { color: red; }
            25% { color: blue; }
            50% { color: green; }
            75% { color: yellow; }
            100% { color: purple; }
        }

        .welcome-text {
            animation: welcomeAnimation 6s linear forwards;
            font-size: 2em;
            margin-top: 20px;
        }

        @keyframes welcomeAnimation {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        a {
            display: block;
            margin: 10px 0;
            text-decoration: none;
            color: black;
            font-size: 1.5em;
            transition: transform 0.3s;
        }

        a:hover {
            transform: scale(1.1);
            color: yellow;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <p>
        Se você quiser entrar em contato com a Equipe de AtroLand esse é o E-mail: nickcool683@gmail.com    
    </p>
    <b>
        - Equipe AtroLand
    </b>
    <a href="index.html">Voltar</a>
</body>
</html>
