<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - Página Não Encontrada</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            overflow: hidden;
        }
        h1 {
            font-size: 5em;
            animation: glitch 1s infinite;
        }
        .glitch {
            position: relative;
            display: inline-block;
            color: #0ff;
            text-shadow: 2px 0 red, -2px 0 blue;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, -5px); }
            40% { transform: translate(5px, 5px); }
            60% { transform: translate(-5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0); }
        }
        .random-text {
            font-size: 2em;
            margin: 20px 0;
            animation: flicker 0.15s infinite alternate;
        }
        @keyframes flicker {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
        .random-symbols {
            font-size: 1.5em;
            white-space: pre;
        }
    </style>
</head>
<body>
    <h1 class="glitch">ERROR 404</h1>
    <div id="content"></div>
    
    <script>
        // Função para adicionar conteúdo aleatório
        function addRandomContent() {
            const contentDiv = document.getElementById('content');
            const randomTexts = [
                'ZxYx!@# 1234*&^%$#',
                'QWERTYUIOP',
                'gHjKlMnOp',
                'Ocorreu um erro inesperado...',
                'Por favor, tente novamente mais tarde.',
                '~~~~~~~( )~~~~~~~~~~~><<>>~~~~~~~[[[ ]]]~~~~~~~*~*~*~~~^^^~~~!!~~!!',
                '!!!@@@###$$$%%%^^^&&&***((()))',
                '??????....~~~~~....',
                '[[[[[[[[[ ]]]]]]]]]',
                '~~~BUBUBUBUBU~~~'
            ];

            // Adiciona um novo texto aleatório a cada carregamento
            const randomText = randomTexts[Math.floor(Math.random() * randomTexts.length)];
            const newDiv = document.createElement('div');
            newDiv.classList.add('random-text');
            newDiv.textContent = randomText;
            contentDiv.appendChild(newDiv);
            
            // Adiciona elementos bugados adicionais
            for (let i = 0; i < Math.floor(Math.random() * 5) + 3; i++) {
                const randomSymbolDiv = document.createElement('div');
                randomSymbolDiv.classList.add('random-symbols');
                randomSymbolDiv.textContent = generateRandomSymbols();
                contentDiv.appendChild(randomSymbolDiv);
            }
        }

        // Função para gerar símbolos aleatórios
        function generateRandomSymbols() {
            const symbols = '!@#$%^&*()_+[]{}|;:,.<>?';
            let result = '';
            const length = Math.floor(Math.random() * 10) + 5; // Comprimento aleatório entre 5 e 15
            for (let i = 0; i < length; i++) {
                result += symbols.charAt(Math.floor(Math.random() * symbols.length));
            }
            return result;
        }

        // Chama a função ao carregar a página
        window.onload = function() {
            addRandomContent();
        };
    </script>
</body>
</html>
