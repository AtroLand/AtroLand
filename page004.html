<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personagens Removidos</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #1e1e2e;
            color: #fff;
            text-align: center;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #ff9800;
        }

        .disclaimer {
            background-color: #ff5722;
            padding: 20px;
            margin: 20px auto;
            border-radius: 12px;
            max-width: 600px;
            font-size: 1.2rem;
        }

        nav {
            background-color: #333;
            padding: 15px;
            margin: 30px auto;
            border-radius: 8px;
            max-width: 800px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        nav a {
            color: #ffcc80;
            text-decoration: none;
            padding: 12px 20px;
            margin: 5px;
            background-color: #444;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            background-color: #ff9800;
            color: #1e1e2e;
            transform: scale(1.05);
        }

        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #aaa;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            nav {
                flex-direction: column;
            }

            nav a {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <h1>Personagens Removidos</h1>
    <p>Personagens removidos:</p>
    
    <nav>
        <a href="sky.html">Sky</a>
        <p>ERROR911</p>
        <p>Jack</p>
        <p>Sophie</p>
        <p>Martius</p>
        <p>???</p>
    </nav>

    <a href="index.html">Voltar</a>

       <footer>
        <p>&copy; 2025 AtroLand. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
